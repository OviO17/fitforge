{% extends "base.html" %}

{% block content %}
<section class="page-header narrow">
    <h1>Checkout</h1>
    <p>Total: €{{ total }}</p>
    <form method="post" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit">Complete payment</button>
    </form>
</section>
{% endblock %}
