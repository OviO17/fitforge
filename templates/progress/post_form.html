{% extends "base.html" %}

{% block content %}
<section class="page-header narrow">
    <h1>{{ form_title }}</h1>
    <form method="post" enctype="multipart/form-data" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit">Save</button>
    </form>
</section>
{% endblock %}
