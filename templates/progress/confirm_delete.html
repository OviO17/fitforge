{% extends "base.html" %}

{% block content %}
<section class="page-header narrow">
    <h1>Delete progress post</h1>
    <p>Are you sure you want to delete "{{ post.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button class="button" type="submit">Delete post</button>
        <a href="{% url 'progress_list' %}">Cancel</a>
    </form>
</section>
{% endblock %}
